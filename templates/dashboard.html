<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<h2>Welcome {{username}}</h2>

<a href="/add_record" class="btn btn-success">Add Record</a>
<a href="/logout" class="btn btn-danger">Logout</a>

<hr>

<h3>Employee Dataset</h3>

<table class="table table-bordered table-light">

<tr>
<th>ID</th>
<th>Name</th>
<th>Salary</th>
<th>Department</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.id}}</td>
<td>{{row.name}}</td>
<td>{{row.salary}}</td>
<td>{{row.dept}}</td>
</tr>
{% endfor %}

</table>

</div>

<a href="/alerts" class="btn btn-warning">Alerts</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Add Record</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Add Employee Record</h2>

<form method="POST">

<input type="text" name="id" class="form-control my-2"
placeholder="ID" required>

<input type="text" name="name" class="form-control my-2"
placeholder="Name" required>

<input type="text" name="salary" class="form-control my-2"
placeholder="Salary" required>

<input type="text" name="dept" class="form-control my-2"
placeholder="Department" required>

<button class="btn btn-primary">Save</button>

</form>

</div>
</body>
</html>
